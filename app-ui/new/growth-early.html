<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nowa · Growth (early)</title>
<link rel="stylesheet" href="../../design-system/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Noto+Sans:wght@400;500;600;700&family=Tiny5&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --step8:polygon(0 8px,4px 8px,4px 4px,8px 4px,8px 0,calc(100% - 8px) 0,calc(100% - 8px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 8px,100% 8px,100% calc(100% - 8px),calc(100% - 4px) calc(100% - 8px),calc(100% - 4px) calc(100% - 4px),calc(100% - 8px) calc(100% - 4px),calc(100% - 8px) 100%,8px 100%,8px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 8px),0 calc(100% - 8px));
  --step12:polygon(0 12px,6px 12px,6px 6px,12px 6px,12px 0,calc(100% - 12px) 0,calc(100% - 12px) 6px,calc(100% - 6px) 6px,calc(100% - 6px) 12px,100% 12px,100% calc(100% - 12px),calc(100% - 6px) calc(100% - 12px),calc(100% - 6px) calc(100% - 6px),calc(100% - 12px) calc(100% - 6px),calc(100% - 12px) 100%,12px 100%,12px calc(100% - 6px),6px calc(100% - 6px),6px calc(100% - 12px),0 calc(100% - 12px));
}
html,body{height:100%}
body{font-family:var(--font-noto-sans);color:var(--color-deep-ink);background:var(--color-slate-mid);display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;position:relative;overflow:hidden;background-color:var(--surface-warm-parchment);display:flex;flex-direction:column;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
h1,h2,h3{font-family:var(--font-onest);letter-spacing:-.02em;line-height:1.15}
.appbar{backdrop-filter:blur(12px);background:color-mix(in srgb,var(--color-warm-parchment) 84%,transparent);border-bottom:1px solid rgba(22,28,36,.07);padding:14px 18px;display:flex;align-items:center;gap:12px}
.appbar h1{font-size:24px;font-weight:800;flex:1}
.seg{display:flex;gap:6px}
.mtab{font-family:var(--font-onest);font-weight:700;font-size:12px;padding:7px 14px 9px;border:0;clip-path:var(--step8);background:linear-gradient(var(--surface-pure-white),var(--surface-pure-white)) no-repeat 0 0/100% calc(100% - 4px),var(--color-cloud-border);color:var(--color-slate-mid)}
.mtab.on{background:var(--color-deep-ink);color:#fff}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 36px 40px;gap:8px}
/* soft pixel illustration placeholder */
.illus{width:150px;height:150px;position:relative;margin-bottom:18px;display:flex;align-items:center;justify-content:center}
.illus .pad{position:absolute;inset:0;clip-path:var(--step12);background:repeating-linear-gradient(45deg,rgba(22,28,36,.045) 0 8px,transparent 8px 16px),#fdecea;border:0}
.illus .sprout{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.illus .seed{width:54px;height:54px;clip-path:var(--step12);background:var(--surface-pure-white);display:flex;align-items:center;justify-content:center;font-family:var(--font-pixel);font-size:26px;color:var(--color-coral-flame)}
.illus .cells{display:flex;gap:4px}
.illus .cells i{width:12px;height:12px;background:var(--color-chalk-surface)}
.illus .cells i:first-child{background:var(--color-coral-flame)}
.empty .ek{font-family:var(--font-pixel);font-size:12px;letter-spacing:.06em;color:var(--color-coral-flame);margin-bottom:4px}
.empty h2{font-size:22px;font-weight:800;max-width:18ch}
.empty p{font-size:14px;color:var(--color-slate-mid);line-height:1.55;max-width:34ch;margin-top:4px}
.tabbar{display:flex;justify-content:space-around;align-items:center;padding:12px 8px 16px;background:color-mix(in srgb,var(--color-warm-parchment) 92%,transparent);border-top:1px solid rgba(22,28,36,.08)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--color-mist-body);flex:1}
.tab svg{width:24px;height:24px}.tab .lab{font-family:var(--font-onest);font-weight:700;font-size:10px}
.tab.on{color:var(--color-coral-flame)}.tab.on .dot{width:14px;height:3px;background:var(--color-coral-flame);margin-top:1px}
</style>
</head>
<body>
<div class="phone">
  <header class="appbar"><h1>Growth</h1><div class="seg"><button class="mtab on">Week</button><button class="mtab">Month</button></div></header>
  <div class="empty">
    <div class="illus">
      <div class="pad"></div>
      <div class="sprout">
        <div class="seed">?</div>
        <div class="cells"><i></i><i></i><i></i><i></i></div>
      </div>
    </div>
    <div class="ek">JUST GETTING STARTED</div>
    <h2>A few more days of play and patterns will grow here.</h2>
    <p>Nowa only surfaces what genuinely matters — so it waits until there's something real to show you. Check back soon.</p>
  </div>
  <nav class="tabbar">
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11l8-6 8 6v8a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1z"/></svg><span class="lab">Today</span></div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 14c1.2 1.5 6.8 1.5 8 0M9 9.5h.01M15 9.5h.01"/></svg><span class="lab">Pet</span></div>
    <div class="tab on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-7"/></svg><span class="lab">Growth</span><span class="dot"></span></div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg><span class="lab">Controls</span></div>
  </nav>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nowa · Add mission</title>
<link rel="stylesheet" href="../../design-system/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Noto+Sans:wght@400;500;600;700&family=Tiny5&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --step8:polygon(0 8px,4px 8px,4px 4px,8px 4px,8px 0,calc(100% - 8px) 0,calc(100% - 8px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 8px,100% 8px,100% calc(100% - 8px),calc(100% - 4px) calc(100% - 8px),calc(100% - 4px) calc(100% - 4px),calc(100% - 8px) calc(100% - 4px),calc(100% - 8px) 100%,8px 100%,8px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 8px),0 calc(100% - 8px));
}
html,body{height:100%}
body{font-family:var(--font-noto-sans);color:var(--color-deep-ink);background:var(--color-slate-mid);display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;position:relative;overflow:hidden;background:var(--surface-warm-parchment);display:flex;flex-direction:column;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
h1,h2,h3,h4{font-family:var(--font-onest);letter-spacing:-.02em;line-height:1.12}
/* dimmed backdrop (mission list behind) */
.backdrop{position:absolute;inset:0;background:var(--surface-warm-parchment);}
.backdrop::after{content:"";position:absolute;inset:0;background:rgba(22,28,36,.55)}
/* sheet */
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:2;max-height:92%;overflow-y:auto;background:var(--surface-pure-white);border-radius:24px 24px 0 0;padding:10px 20px 28px;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
.handle{width:44px;height:5px;border-radius:999px;background:var(--color-cloud-border);margin:6px auto 14px}
.shead{display:flex;align-items:center;margin-bottom:18px}
.shead h2{font-size:22px;font-weight:800;flex:1}
.closeb{width:34px;height:34px;border:0;background:var(--surface-ghost-white);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--color-slate-mid)}
.closeb svg{width:16px;height:16px}
.field{margin-bottom:20px}
.field>label{display:block;font-family:var(--font-onest);font-weight:700;font-size:13px;color:var(--color-deep-ink);margin-bottom:8px}
.field input[type=text]{width:100%;font-family:var(--font-noto-sans);font-size:16px;color:var(--color-deep-ink);padding:13px 14px;border:1.5px solid var(--color-cloud-border);border-radius:12px;background:var(--surface-ghost-white);outline:none}
.field input[type=text]:focus{border-color:var(--color-coral-flame)}
/* segmented mission type */
.types{display:flex;flex-direction:column;gap:8px}
.type{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid var(--color-cloud-border);border-radius:12px;background:var(--surface-ghost-white);cursor:pointer;font-family:var(--font-onest);font-weight:700;font-size:14px}
.type.on{border-color:var(--color-coral-flame);background:#fdecea}
.type .rad{width:18px;height:18px;border-radius:50%;border:2px solid var(--color-cloud-border);flex:none}
.type.on .rad{border-color:var(--color-coral-flame);background:radial-gradient(circle,var(--color-coral-flame) 0 40%,transparent 45%)}
.type .tname{flex:1}
.plus{font-family:var(--font-pixel);font-size:10px;letter-spacing:.05em;background:var(--color-deep-ink);color:var(--color-amber-signal);padding:2px 6px;display:inline-flex;align-items:center;gap:4px}
/* time + days */
.rowflex{display:flex;gap:10px}
.chip{flex:1;text-align:center;padding:11px 6px;border:1.5px solid var(--color-cloud-border);border-radius:10px;background:var(--surface-ghost-white);font-family:var(--font-onest);font-weight:700;font-size:13px;color:var(--color-slate-mid);cursor:pointer}
.chip.on{border-color:var(--color-coral-flame);background:#fdecea;color:var(--color-deep-ink)}
.timeval{font-family:var(--font-pixel);font-size:16px;color:var(--color-deep-ink);background:var(--surface-ghost-white);border:1.5px solid var(--color-cloud-border);border-radius:10px;padding:10px 14px;display:inline-block}
.days{display:flex;gap:6px}
.day{flex:1;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--color-cloud-border);background:var(--surface-ghost-white);font-family:var(--font-onest);font-weight:700;font-size:13px;color:var(--color-slate-mid);cursor:pointer}
.day.on{border-color:transparent;background:var(--color-coral-flame);color:#fff}
/* preview device frame */
.preview{margin:6px 0 22px}
.preview .pl{font-family:var(--font-onest);font-weight:700;font-size:13px;margin-bottom:10px}
.device-frame{margin:0 auto;max-width:240px;background:var(--surface-pure-white);border:3px solid var(--color-deep-ink);padding:10px 10px 0}
.device-frame .screen{position:relative;background:var(--color-ink-charcoal);border:2px solid var(--color-deep-ink);height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;overflow:hidden;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:18px 18px}
.device-frame .pet{width:64px;image-rendering:pixelated}
.device-frame .bubble{font-family:var(--font-pixel);font-size:15px;color:var(--color-amber-signal);letter-spacing:.05em}
.device-frame .spark{position:absolute;top:18px;right:24px;width:12px;height:12px;background:var(--color-amber-signal);clip-path:polygon(40% 0,60% 0,60% 40%,100% 40%,100% 60%,60% 60%,60% 100%,40% 100%,40% 60%,0 60%,0 40%,40% 40%)}
.df-buttons{display:flex;justify-content:center;gap:14px;padding:10px}
.db{width:16px;height:16px;border-radius:50%}.db.y{background:var(--color-amber-signal)}.db.r{background:var(--color-coral-flame);width:28px;border-radius:8px}.db.b{background:#6c9bd2}
.previewcap{text-align:center;font-size:11px;color:var(--color-mist-body);margin-top:10px}
/* save */
.save{position:relative;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-onest);font-weight:700;font-size:16px;color:#fff;padding:15px 20px 19px;border:0;cursor:pointer;clip-path:var(--step8);background:linear-gradient(var(--color-coral-flame),var(--color-coral-flame)) no-repeat 0 0/100% calc(100% - 6px),var(--color-ember-deep);transition:transform 70ms steps(2)}
.save:active{transform:translateY(4px);background-size:100% calc(100% - 2px)}
::selection{background:var(--color-coral-flame);color:#fff}
</style>
</head>
<body>
<div class="phone">
  <div class="backdrop"></div>
  <div class="sheet">
    <div class="handle"></div>
    <div class="shead"><h2>New mission</h2><button class="closeb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>

    <div class="field">
      <label>Routine name</label>
      <input type="text" value="Brush teeth" />
    </div>

    <div class="field">
      <label>Mission type</label>
      <div class="types">
        <div class="type on"><span class="rad"></span><span class="tname">Habit &amp; Routine</span></div>
        <div class="type"><span class="rad"></span><span class="tname">Emotional Regulation</span><span class="plus">NOWA+</span></div>
        <div class="type"><span class="rad"></span><span class="tname">Executive Function</span><span class="plus">NOWA+</span></div>
      </div>
    </div>

    <div class="field">
      <label>When</label>
      <div class="rowflex" style="margin-bottom:10px">
        <span class="chip on">Morning</span><span class="chip">After school</span><span class="chip">Bedtime</span>
      </div>
      <div class="rowflex" style="align-items:center;gap:12px">
        <span style="font-size:13px;color:var(--color-slate-mid)">Time</span>
        <span class="timeval">7:30a</span>
      </div>
    </div>

    <div class="field">
      <label>Days</label>
      <div class="days">
        <span class="day on">M</span><span class="day on">T</span><span class="day on">W</span><span class="day on">T</span><span class="day on">F</span><span class="day">S</span><span class="day">S</span>
      </div>
    </div>

    <div class="preview">
      <div class="pl">How your child sees it</div>
      <div class="device-frame">
        <div class="screen">
          <span class="spark"></span>
          <img class="pet px" src="../../pages/assets/species/brim.png" alt="pet">
          <span class="bubble">♪ brush time!</span>
        </div>
        <div class="df-buttons"><span class="db y"></span><span class="db r"></span><span class="db b"></span></div>
      </div>
      <div class="previewcap">Your pet asks for help — in sounds &amp; animation, never words.</div>
    </div>

    <button class="save">Save mission</button>
  </div>
</div>
</body>
</html>

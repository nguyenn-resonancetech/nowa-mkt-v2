<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nowa · Parent portal</title>
<link rel="stylesheet" href="../../design-system/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Noto+Sans:wght@400;500;600;700&family=Tiny5&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --step8:polygon(0 8px,4px 8px,4px 4px,8px 4px,8px 0,calc(100% - 8px) 0,calc(100% - 8px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 8px,100% 8px,100% calc(100% - 8px),calc(100% - 4px) calc(100% - 8px),calc(100% - 4px) calc(100% - 4px),calc(100% - 8px) calc(100% - 4px),calc(100% - 8px) 100%,8px 100%,8px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 8px),0 calc(100% - 8px));
  --step12:polygon(0 12px,6px 12px,6px 6px,12px 6px,12px 0,calc(100% - 12px) 0,calc(100% - 12px) 6px,calc(100% - 6px) 6px,calc(100% - 6px) 12px,100% 12px,100% calc(100% - 12px),calc(100% - 6px) calc(100% - 12px),calc(100% - 6px) calc(100% - 6px),calc(100% - 12px) calc(100% - 6px),calc(100% - 12px) 100%,12px 100%,12px calc(100% - 6px),6px calc(100% - 6px),6px calc(100% - 12px),0 calc(100% - 12px));
}
html,body{height:100%}
body{font-family:var(--font-noto-sans);color:var(--color-deep-ink);background:var(--color-slate-mid);
  display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;position:relative;overflow:hidden;background-color:var(--surface-warm-parchment);
  display:flex;flex-direction:column;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
.scroll{flex:1;overflow-y:auto;padding:0 20px 96px}
h1,h2,h3,h4{font-family:var(--font-onest);letter-spacing:-.02em;line-height:1.1}

/* app bar (with title built in, like the Figma frame) */
.appbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(12px);
  background:color-mix(in srgb,var(--color-warm-parchment) 82%,transparent);
  border-bottom:1px solid rgba(22,28,36,.07);padding:16px 20px 18px}
.appbar .top{display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--font-onest);font-weight:800;font-size:20px}
.brand .bcell{width:12px;height:12px;background:var(--color-coral-flame);transition:transform .3s var(--ease-expo)}
.brand:active .bcell{transform:rotate(90deg)}
.actions{display:flex;gap:10px}
.iconbtn{width:38px;height:38px;background:var(--surface-pure-white);clip-path:var(--step8);
  display:flex;align-items:center;justify-content:center;filter:drop-shadow(var(--px-shadow));cursor:pointer}
.iconbtn svg{width:20px;height:20px}
.iconbtn .pet{font-family:var(--font-pixel);font-size:13px;color:var(--color-deep-ink)}
.appbar h1{font-size:28px;font-weight:800;margin-top:14px}

/* settings rows as pixel cards */
.list{display:flex;flex-direction:column;gap:14px;padding:22px 10px 10px 0}
.row{position:relative;display:flex;align-items:center;gap:16px;padding:18px 18px;
  --pxbg:var(--surface-pure-white);--pxborder:var(--color-chalk-surface);filter:drop-shadow(var(--px-shadow))}
.row::before{content:"";position:absolute;inset:0;z-index:0;clip-path:var(--step12);
  background:linear-gradient(var(--pxbg),var(--pxbg)) 1px 1px/calc(100% - 2px) calc(100% - 2px) no-repeat,var(--pxborder)}
.row>*{position:relative;z-index:1}
.row .txt{flex:1}
.row h3{font-size:var(--text-subheading);font-weight:800;margin-bottom:4px}
.row p{font-size:var(--text-body-sm);color:var(--color-slate-mid);line-height:1.45}

/* toggle — native iOS-style (control layer); coral = on keeps it Nowa */
.toggle{width:51px;height:31px;flex:none;position:relative;cursor:pointer;border:0;padding:0;background:transparent}
.toggle .track{position:absolute;inset:0;border-radius:999px;
  background:var(--color-chalk-surface);transition:background 200ms var(--ease-out-strong)}
.toggle .knob{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;
  background:#fff;transition:transform 200ms var(--ease-out-strong);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle[aria-pressed="true"] .track{background:var(--color-coral-flame)}
.toggle[aria-pressed="true"] .knob{transform:translateX(20px)}

/* temporary-pause card */
.pausecard{margin-top:6px}
.pausecard p{margin-bottom:16px}
.pausebtn{position:relative;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--font-onest);font-weight:700;font-size:var(--text-body);color:var(--color-deep-ink);
  padding:15px 20px;border:0;cursor:pointer;background:transparent;clip-path:var(--step8);
  transition:transform 70ms steps(2)}
.pausebtn::before{content:"";position:absolute;inset:0;z-index:0;clip-path:var(--step8);
  background:linear-gradient(var(--surface-warm-parchment),var(--surface-warm-parchment)) 1px 1px/calc(100% - 2px) calc(100% - 2px) no-repeat,var(--color-slate-mid)}
.pausebtn>*{position:relative;z-index:1}
.pausebtn:active{transform:translateY(2px)}
.pausebtn .ico{display:flex;gap:3px}
.pausebtn .ico i{width:4px;height:14px;background:var(--color-coral-flame);display:block}

/* tab bar */
.tabbar{position:absolute;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;align-items:center;
  padding:12px 8px 16px;background:color-mix(in srgb,var(--color-warm-parchment) 90%,transparent);
  backdrop-filter:blur(12px);border-top:1px solid rgba(22,28,36,.08)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--color-mist-body);cursor:pointer;flex:1}
.tab svg{width:24px;height:24px}
.tab .lab{font-family:var(--font-onest);font-weight:700;font-size:10px}
.tab.on{color:var(--color-coral-flame)}
.tab.on .dot{width:14px;height:3px;background:var(--color-coral-flame);margin-top:1px}

::selection{background:var(--color-coral-flame);color:#fff}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="phone">
  <header class="appbar">
    <div class="top">
      <div class="brand"><span class="bcell"></span>nowa</div>
      <div class="actions">
        <div class="iconbtn" title="Pet"><span class="pet">^·^</span></div>
        <div class="iconbtn" title="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></div>
      </div>
    </div>
    <h1>Parent portal</h1>
  </header>

  <div class="scroll">
    <div class="list">
      <div class="row">
        <div class="txt">
          <h3>Daily time limit</h3>
          <p>Set daily usage limits for NOA</p>
        </div>
        <button class="toggle" aria-pressed="false" aria-label="Daily time limit"><span class="track"></span><span class="knob"></span></button>
      </div>

      <div class="row">
        <div class="txt">
          <h3>Bed time</h3>
          <p>Set hours when NOA should not be available</p>
        </div>
        <button class="toggle" aria-pressed="false" aria-label="Bed time"><span class="track"></span><span class="knob"></span></button>
      </div>

      <div class="row pausecard" style="display:block">
        <div class="txt">
          <h3>Temporary pause</h3>
          <p>Pause the companion temporarily. It won't respond during this period.</p>
        </div>
        <button class="pausebtn"><span class="ico"><i></i><i></i></span><span>Pause for 1 hour</span></button>
      </div>
    </div>
  </div>

  <nav class="tabbar">
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="1"/><circle cx="9" cy="10" r="2"/><path d="M6 16c0-2 6-2 6 0M15 9h4M15 13h4"/></svg><span class="lab">Profile</span></div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 14c1.2 1.5 6.8 1.5 8 0M9 9.5h.01M15 9.5h.01"/></svg><span class="lab">Pet</span></div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16v10H9l-4 4V5z"/></svg><span class="lab">Chat</span></div>
    <div class="tab on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18a8 8 0 0116 0"/><path d="M12 14l4-4"/><circle cx="12" cy="18" r="1.3" fill="currentColor"/></svg><span class="lab">Portal</span><span class="dot"></span></div>
  </nav>
</div>

<script>
document.querySelectorAll('.toggle').forEach(t=>{
  t.addEventListener('click',()=>t.setAttribute('aria-pressed', t.getAttribute('aria-pressed')==='true'?'false':'true'));
});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nowa · Mission Control (empty)</title>
<link rel="stylesheet" href="../../design-system/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800;900&family=Noto+Sans:wght@400;500;600;700&family=Tiny5&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --step8:polygon(0 8px,4px 8px,4px 4px,8px 4px,8px 0,calc(100% - 8px) 0,calc(100% - 8px) 4px,calc(100% - 4px) 4px,calc(100% - 4px) 8px,100% 8px,100% calc(100% - 8px),calc(100% - 4px) calc(100% - 8px),calc(100% - 4px) calc(100% - 4px),calc(100% - 8px) calc(100% - 4px),calc(100% - 8px) 100%,8px 100%,8px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 8px),0 calc(100% - 8px));
  --step12:polygon(0 12px,6px 12px,6px 6px,12px 6px,12px 0,calc(100% - 12px) 0,calc(100% - 12px) 6px,calc(100% - 6px) 6px,calc(100% - 6px) 12px,100% 12px,100% calc(100% - 12px),calc(100% - 6px) calc(100% - 12px),calc(100% - 6px) calc(100% - 6px),calc(100% - 12px) calc(100% - 6px),calc(100% - 12px) 100%,12px 100%,12px calc(100% - 6px),6px calc(100% - 6px),6px calc(100% - 12px),0 calc(100% - 12px));
}
html,body{height:100%}
body{font-family:var(--font-noto-sans);color:var(--color-deep-ink);background:var(--color-slate-mid);display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.phone{width:393px;height:852px;position:relative;overflow:hidden;background-color:var(--surface-warm-parchment);display:flex;flex-direction:column;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
h1,h2,h3{font-family:var(--font-onest);letter-spacing:-.02em;line-height:1.15}
.appbar{backdrop-filter:blur(12px);background:color-mix(in srgb,var(--color-warm-parchment) 84%,transparent);border-bottom:1px solid rgba(22,28,36,.07);padding:14px 18px;display:flex;align-items:center;gap:12px}
.backbtn{width:38px;height:38px;background:var(--surface-pure-white);clip-path:var(--step8);display:flex;align-items:center;justify-content:center;filter:drop-shadow(var(--px-shadow));cursor:pointer}
.backbtn svg{width:18px;height:18px}
.appbar h1{font-size:21px;font-weight:800;flex:1}
.addbtn{width:38px;height:38px;background:transparent;border:0;position:relative;cursor:pointer;clip-path:var(--step8)}
.addbtn::before{content:"";position:absolute;inset:0;background:linear-gradient(var(--color-coral-flame),var(--color-coral-flame)) no-repeat 0 0/100% calc(100% - 4px),var(--color-ember-deep);clip-path:var(--step8)}
.addbtn span{position:relative;z-index:1;color:#fff;font-family:var(--font-onest);font-weight:800;font-size:22px;line-height:1}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 36px 60px;gap:6px}
.illus{width:170px;height:160px;position:relative;margin-bottom:20px;display:flex;align-items:center;justify-content:center}
.illus .pad{position:absolute;inset:0;clip-path:var(--step12);background:repeating-linear-gradient(45deg,rgba(22,28,36,.045) 0 8px,transparent 8px 16px),var(--surface-pure-white)}
.illus img{position:relative;z-index:1;width:96px;image-rendering:pixelated}
.illus .z{position:absolute;z-index:1;font-family:var(--font-pixel);color:var(--color-coral-flame)}
.illus .z1{top:24px;right:32px;font-size:18px}.illus .z2{top:40px;right:50px;font-size:13px;opacity:.7}
.empty .ek{font-family:var(--font-pixel);font-size:12px;letter-spacing:.06em;color:var(--color-coral-flame);margin-bottom:4px}
.empty h2{font-size:23px;font-weight:800;max-width:16ch}
.empty p{font-size:14px;color:var(--color-slate-mid);line-height:1.55;max-width:32ch;margin:4px 0 22px}
.cta{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-onest);font-weight:700;font-size:16px;color:#fff;padding:15px 30px 19px;border:0;cursor:pointer;clip-path:var(--step8);background:linear-gradient(var(--color-coral-flame),var(--color-coral-flame)) no-repeat 0 0/100% calc(100% - 6px),var(--color-ember-deep);transition:transform 70ms steps(2)}
.cta:active{transform:translateY(4px);background-size:100% calc(100% - 2px)}
.tabbar{display:flex;justify-content:space-around;align-items:center;padding:12px 8px 16px;background:color-mix(in srgb,var(--color-warm-parchment) 92%,transparent);border-top:1px solid rgba(22,28,36,.08)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--color-mist-body);flex:1}
.tab svg{width:24px;height:24px}.tab .lab{font-family:var(--font-onest);font-weight:700;font-size:10px}
.tab.on{color:var(--color-coral-flame)}.tab.on .dot{width:14px;height:3px;background:var(--color-coral-flame);margin-top:1px}
</style>
</head>
<body>
<div class="phone">
  <header class="appbar">
    <div class="backbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></div>
    <h1>Mission Control</h1>
    <button class="addbtn"><span>+</span></button>
  </header>
  <div class="empty">
    <div class="illus">
      <div class="pad"></div>
      <img class="px" src="../../pages/assets/species/miko.png" alt="pet resting">
      <span class="z z1">z</span><span class="z z2">z</span>
    </div>
    <div class="ek">READY WHEN YOU ARE</div>
    <h2>No missions yet.</h2>
    <p>Add your child's first routine — bedtime, brushing teeth, a feelings check-in — and the pet will start needing help with it.</p>
    <button class="cta">+ Add first mission</button>
  </div>
  <nav class="tabbar">
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11l8-6 8 6v8a1 1 0 01-1 1h-4v-6h-6v6H5a1 1 0 01-1-1z"/></svg><span class="lab">Today</span></div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 14c1.2 1.5 6.8 1.5 8 0M9 9.5h.01M15 9.5h.01"/></svg><span class="lab">Pet</span></div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-7"/></svg><span class="lab">Growth</span></div>
    <div class="tab on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg><span class="lab">Controls</span><span class="dot"></span></div>
  </nav>
</div>
</body>
</html>
